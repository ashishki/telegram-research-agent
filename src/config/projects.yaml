projects:
  - name: gdev-agent
    repo: ashishki/gdev-agent
    description: "Multi-tenant AI triage service. FastAPI, PostgreSQL/pgvector, Redis, Claude API. Webhook ingestion, LLM classification, approval workflow."
    focus: "service layer patterns, eval pipeline, cost control, multi-tenant RLS, async FastAPI"
    keywords:
      - fastapi
      - redis
      - triage
      - service
      - cost
      - control
      - async
      - webhook
      - classification
    exclude_keywords:
      - film

  - name: telegram-research-agent
    repo: ashishki/telegram-research-agent
    description: "Personal research intelligence pipeline for Telegram channels. Deterministic scoring, preference-shaped synthesis, project-aware recommendations, reaction feedback, evidence memory, and decision continuity."
    focus: "digest quality, signal scoring, reaction feedback loop, project-aware insight generation, evidence memory, decision journal, low-signal alerts"
    keywords:
      - digest
      - clustering
      - quality
      - delivery
      - workflow
      - signal
      - scoring
      - reactions
      - feedback
      - evidence
      - decisions
    exclude_keywords:
      - film

  - name: film-school-assistant
    repo: ashishki/film-school-assistant
    description: "Private Telegram-first creative workflow assistant for directors and film students. Captures text and voice notes, structures notes/ideas/homework/deadlines, maintains project continuity, evidence memory, reflection, recurring practices, and weekly summaries."
    focus: "creative workflow continuity, project-scoped memory, evidence recall, reflection quality, voice capture, Telegram UX, recurring practices, weekly creative progress"
    keywords:
      - film
      - director
      - creative
      - continuity
      - memory
      - reflection
      - evidence
      - voice
      - practice
      - notes
      - ideas
      - deadlines
      - education
      - telegram
      - assistant
    exclude_keywords:
      - fastapi
      - postgresql

  - name: ai-workflow-playbook
    repo: ashishki/AI_workflow_playbook
    description: "Reusable AI-assisted development workflow. Phase-based orchestration, review cycles, implementation contracts."
    focus: "workflow automation, agent orchestration, quality gates, developer tooling"
    keywords:
      - workflow
      - orchestration
      - automation
      - agent
      - quality
      - developer
      - tooling
    exclude_keywords:
      - film
      - postgresql
